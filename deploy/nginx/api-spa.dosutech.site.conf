# API → 127.0.0.1:3010. Cùng bộ cert với FE (SAN: api-spa + spacrm)
# CORS FRONTEND_URL: https://spacrm.dosutech.site

server {
    listen 80;
    listen [::]:80;
    server_name api-spa.dosutech.site;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api-spa.dosutech.site;

    ssl_certificate /etc/letsencrypt/live/spacrm.dosutech.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/spacrm.dosutech.site/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log /var/log/nginx/api-spa.access.log;
    error_log  /var/log/nginx/api-spa.error.log;
}
