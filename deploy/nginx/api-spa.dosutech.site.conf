# API NestJS (mặc định :3000, prefix /api) — http 80
# Đổi `proxy_pass` nếu app chạy cổng khác
# CORS/allowed origins: cấu hình ở backend (Nest) cho origin https://spacrm.dosutech.site

server {
    listen 80;
    listen [::]:80;
    server_name api-spa.dosutech.site;

    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log /var/log/nginx/api-spa.access.log;
    error_log  /var/log/nginx/api-spa.error.log;
}
