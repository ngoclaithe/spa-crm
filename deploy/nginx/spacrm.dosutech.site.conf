# FE: Vite dist. Cert LE (một cert cho cả 2 tên): thư mục spacrm.dosutech.site
# Sau chỉnh: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name spacrm.dosutech.site;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name spacrm.dosutech.site;

    ssl_certificate /etc/letsencrypt/live/spacrm.dosutech.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/spacrm.dosutech.site/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /home/spa-crm/ui/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    access_log /var/log/nginx/spacrm.access.log;
    error_log  /var/log/nginx/spacrm.error.log;
}
