# Giao diện SPA (Vite build) — http 80
# Rồi: sudo ln -s /path/to/this.conf /etc/nginx/sites-enabled/
# Sửa `root` cho đúng thư mục chứa file `dist` sau khi chạy `npm run build` ở ui/

server {
    listen 80;
    listen [::]:80;
    server_name spacrm.dosutech.site;

    # Ví dụ: scp -r ui/dist/* /var/www/spacrm/
    root /var/www/spacrm;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # cache tĩnh (tùy chọn)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    access_log /var/log/nginx/spacrm.access.log;
    error_log  /var/log/nginx/spacrm.error.log;
}
