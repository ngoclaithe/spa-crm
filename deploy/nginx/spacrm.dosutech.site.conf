# Giao diện SPA (Vite build) — http 80
# Thư mục build: /home/spa-crm/ui → chạy `npm run build` tạo dist/ cùng cấp với src/
# Rồi: sudo ln -s /path/to/this.conf /etc/nginx/sites-enabled/

server {
    listen 80;
    listen [::]:80;
    server_name spacrm.dosutech.site;

    # `root` = thư mục chứa index.html (output Vite, mặc định `dist`)
    # Nếu nginx báo 403: đảm bảo www-data đọc được (vd. chmod 755 /home /home/spa-crm, hoặc thêm xattrs)
    root /home/spa-crm/ui/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # cache tĩnh (tùy chọn)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    access_log /var/log/nginx/spacrm.access.log;
    error_log  /var/log/nginx/spacrm.error.log;
}
